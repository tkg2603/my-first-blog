{% extends 'tasks/base.html' %}
{% block content %}

<div class="container" style="max-width: 400px;">
    <h2 class="text-center mb-4">タスク編集</h2>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">タイトル</label>
            <input type="text" name="title" value="{{ task.title }}" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">優先度</label>
            <select name="priority" class="form-select">
                <option value="high" {% if task.priority == 'high' %}selected{% endif %}>★★★</option>
                <option value="medium" {% if task.priority == 'medium' %}selected{% endif %}>★★</option>
                <option value="low" {% if task.priority == 'low' %}selected{% endif %}>★</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">期限</label>
            <input type="datetime-local" name="due_date"
                   value="{{ task.due_date|date:'Y-m-d\\TH:i' }}"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">ステータス</label>
            <select name="status" class="form-select">
                <option value="todo" {% if task.status == 'todo' %}selected{% endif %}>まだだよ</option>
                <option value="in_progress" {% if task.status == 'in_progress' %}selected{% endif %}>やってるよ</option>
                <option value="done" {% if task.status == 'done' %}selected{% endif %}>できたよ</option>
            </select>
        </div>

        <div class="d-flex justify-content-center gap-2 mt-3">
            <button type="submit" class="btn btn-primary px-4">
               更新
            </button>

            {% if user.role == 'mama' or user.role == 'papa' %}
           <button type="submit" formaction="{% url 'task_delete' task.id %}"
                   class="btn btn-outline-danger">
               削除
            </button>
            {% endif %}
        </div>

    </form>

    <div class="text-center mt-3">
       <a href="{% url 'home' %}" class="btn btn-outline-secondary">
            戻る
       </a>
    </div>
</div>

{% endblock %}
