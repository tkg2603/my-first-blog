{% extends 'tasks/base.html' %}

{% block title %}ログイン{% endblock %}

{% block content %}
    <div style="max-width: 410px;" class="mx-auto">

        <h1 class="text-center mb-4">ログイン</h1>
        
        {% if form.errors %}
            <div class="alert alert-danger">
                ユーザー名またはパスワードが正しくありません。
                大文字・小文字も確認してください。
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <p>
               <label>ユーザー名</label>
               {{ form.username }}
            </p>
            <p>
               <label>パスワード</label>
               {{ form.password }}
            </p>

            <div class="mt-3">
               <button type="submit" class="btn btn-primary w-100 mt-2">
                   ログイン
               </button>

               <a href="{% url 'register' %}" class="btn btn-outline-secondary w-100 mt-2">
                   新規登録
               </a>
            </div>
        </form>

    </div>


{% endblock %}
